services:
  postgres:
    image: postgres:latest
    container_name: resumeiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumeiq}
      POSTGRES_USER: ${POSTGRES_USER:-resumeiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumeiq}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumeiq} -d ${POSTGRES_DB:-resumeiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: resumeiq-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: resumeiq-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: resumeiq-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env.example
    environment:
      RESUMEIQ_DATABASE_URL: ${RESUMEIQ_DATABASE_URL:-postgresql+asyncpg://resumeiq:resumeiq@postgres:5432/resumeiq}
      RESUMEIQ_REDIS_URL: ${RESUMEIQ_REDIS_URL:-redis://redis:6379/0}
      RESUMEIQ_QDRANT_URL: ${RESUMEIQ_QDRANT_URL:-http://qdrant:6333}
      RESUMEIQ_ENVIRONMENT: ${RESUMEIQ_ENVIRONMENT:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: resumeiq-frontend
    restart: unless-stopped
    env_file:
      - apps/frontend/.env.example
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ResumeIQ AI}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
